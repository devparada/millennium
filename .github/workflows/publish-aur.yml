name: Push Arch User Repository (AUR) Package

# Manual fallback — AUR publishing is handled automatically by ci.yml.
# Use this only if you need to re-deploy to AUR without a full CI run.

on:
  workflow_dispatch:

concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  update-pkgbuild:
    runs-on: ubuntu-latest
    outputs:
      updated_sha: ${{ steps.push.outputs.updated_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update Package Version and Commit
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG=$(gh release list --limit 100 --json tagName,isPrerelease --jq '[.[] | select(.isPrerelease == false)][0].tagName')
          else
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          CLEAN_TAG=${TAG#v}
          CLEAN_TAG=${CLEAN_TAG//-/_}
          echo "Using tag: $TAG"

          COMMIT=$(gh api repos/${{ github.repository }}/git/refs/tags/$TAG --jq '.object.sha')
          echo "Using commit: $COMMIT"

          OLD_VER=$(grep '^pkgver=' ./packages/arch/PKGBUILD | cut -d= -f2)
          sed -i "s/pkgver=.*/pkgver=$CLEAN_TAG/" ./packages/arch/PKGBUILD
          [ "$OLD_VER" != "$CLEAN_TAG" ] && sed -i "s/pkgrel=.*/pkgrel=1/" ./packages/arch/PKGBUILD
          sed -i "s|source=(\"git+\$url\.git.*\")|source=(\"git+\$url.git#commit=$COMMIT\")|" ./packages/arch/PKGBUILD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push PKGBUILD changes
        id: push
        run: |
          git config --local user.email "github-actions@github.com"
          git config --local user.name "GitHub Actions"
          git add ./packages/arch/PKGBUILD
          git commit -m "Update PKGBUILD for release $(grep '^pkgver=' ./packages/arch/PKGBUILD | cut -d= -f2)" || true
          git push origin ${{ github.ref_name }}
          echo "updated_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  publish-aur:
    needs: update-pkgbuild
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-pkgbuild.outputs.updated_sha }}

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@master
        with:
          pkgname: millennium
          pkgbuild: ./packages/arch/PKGBUILD
          assets: ./packages/arch/millennium.install
          commit_username: GitHub Actions
          commit_email: github-actions@github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update AUR package
          ssh_keyscan_types: rsa,ecdsa,ed25519
