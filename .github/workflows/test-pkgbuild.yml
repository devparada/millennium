name: Test Arch PKGBUILD

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: pkgbuild-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pkgbuild:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Setup pacman and dependencies
        run: |
          # Enable multilib for 32-bit builds
          sed -i '/\[multilib\]/,/Include/s/^#//' /etc/pacman.conf
          pacman -Syu --noconfirm
          pacman -S --noconfirm git curl zip unzip tar cmake ninja lib32-gcc-libs

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build package
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Prepare build directory with PKGBUILD
          cp -r packages/arch /home/builder/pkg
          # Pre-populate srcdir with the local checkout so makepkg skips cloning
          mkdir -p /home/builder/pkg/src
          cp -r "$GITHUB_WORKSPACE" /home/builder/pkg/src/Millennium
          chown -R builder:builder /home/builder/pkg
          su builder -c "git config --global --add safe.directory /home/builder/pkg/src/Millennium"
          su builder -c 'cd /home/builder/pkg && makepkg -s --noconfirm --nodeps --noextract'

      - name: Verify package
        run: |
          echo "Built packages:"
          ls -lh /home/builder/pkg/*.pkg.tar.zst
          echo ""
          echo "Package contents:"
          tar -tf /home/builder/pkg/*.pkg.tar.zst | grep -E '\.(so|so\.[0-9]|$)' | head -20
